<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>LakeCase ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      position: absolute;
      top: 40px;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    .contador {
      font-size: 2rem;
      margin-top: 20px;
      line-height: 1.8;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .tempo {
      font-size: 2.8rem;
      font-weight: bold;
      margin-top: 15px;
    }

    /* FOTOS AO REDOR */
    .foto {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .foto1 { top: 10%; left: 10%; }
    .foto2 { top: 15%; right: 10%; }
    .foto3 { bottom: 10%; left: 15%; }
    .foto4 { bottom: 12%; right: 12%; }

  </style>
</head>
<body>

  <h1>LakeCase ❤️</h1>

  <div class="contador">
    Estamos juntos há:
    <div class="tempo" id="tempo"></div>
  </div>

  <!-- Fotos (depois você troca os links pelas suas fotos) -->
  <img src="https://via.placeholder.com/150" class="foto foto1">
  <img src="https://via.placeholder.com/150" class="foto foto2">
  <img src="https://via.placeholder.com/150" class="foto foto3">
  <img src="https://via.placeholder.com/150" class="foto foto4">

  <script>
    const dataInicio = new Date("2018-06-18T00:00:00");

    function atualizarTempo() {
      const agora = new Date();
      const diferenca = agora - dataInicio;

      const segundosTotais = Math.floor(diferenca / 1000);

      const anos = Math.floor(segundosTotais / (365.25 * 24 * 60 * 60));
      const meses = Math.floor((segundosTotais % (365.25 * 24 * 60 * 60)) / (30.44 * 24 * 60 * 60));
      const dias = Math.floor((segundosTotais % (30.44 * 24 * 60 * 60)) / (24 * 60 * 60));
      const horas = Math.floor((segundosTotais % (24 * 60 * 60)) / (60 * 60));
      const minutos = Math.floor((segundosTotais % (60 * 60)) / 60);
      const segundos = segundosTotais % 60;

      document.getElementById("tempo").innerHTML =
        `${anos} anos, ${meses} meses, ${dias} dias<br>
         ${horas}h ${minutos}m ${segundos}s`;
    }

    setInterval(atualizarTempo, 1000);
    atualizarTempo();
  </script>

</body>
</html>
