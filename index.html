<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luan & Keysse ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4e8a,#ff8fb1);
color:white;
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4e8a,#ff8fb1);
z-index:10;
}

#login input{
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
}

#login button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
color:#ff4e8a;
font-weight:bold;
}

/* SITE */
#site{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
z-index:2;
}

h1{
font-size:3rem;
margin-bottom:20px;
animation:fadeIn 2s ease-in-out;
}

.contador{
font-size:1.8rem;
background:rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
animation:pulse 3s infinite;
}

.tempo{
margin-top:15px;
font-size:2rem;
font-weight:bold;
}

/* CORAÇÕES */
.heart{
position:absolute;
bottom:-50px;
color:white;
font-size:24px;
animation:float 8s linear infinite;
opacity:0.8;
}

@keyframes float{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-110vh) scale(1.5);}
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Digite nossa senha ❤️</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="verificarSenha()">Entrar</button>
<p id="erro" style="margin-top:10px;"></p>
</div>

<!-- SITE -->
<div id="site">
<h1>Luan & Keysse ❤️</h1>
<div class="contador">
Estamos juntos há:
<div class="tempo" id="tempo"></div>
</div>
</div>

<!-- MÚSICA -->
<audio id="musica" loop preload="auto">
<source src="matura.mp3" type="audio/mp3">
</audio>

<script>

// ===== SENHA =====
function verificarSenha(){
const senhaCorreta = "18062018";
const senhaDigitada = document.getElementById("senha").value;

if(senhaDigitada === senhaCorreta){
document.getElementById("login").style.display="none";
document.getElementById("site").style.display="flex";

const musica = document.getElementById("musica");
musica.volume = 0.6;
musica.play().catch(e => console.log("Autoplay bloqueado"));

criarCoracoes();
}else{
document.getElementById("erro").innerText="Senha incorreta 😢";
}
}

// ===== CONTADOR =====
const dataInicio = new Date("2018-06-18T00:00:00");

function atualizarTempo(){
const agora = new Date();
const diferenca = agora - dataInicio;

const segundosTotais = Math.floor(diferenca / 1000);

const anos = Math.floor(segundosTotais / (365.25*24*60*60));
const meses = Math.floor((segundosTotais % (365.25*24*60*60)) / (30.44*24*60*60));
const dias = Math.floor((segundosTotais % (30.44*24*60*60)) / (24*60*60));
const horas = Math.floor((segundosTotais % (24*60*60)) / (60*60));
const minutos = Math.floor((segundosTotais % (60*60)) / 60);
const segundos = segundosTotais % 60;

document.getElementById("tempo").innerHTML =
`${anos} anos, ${meses} meses, ${dias} dias<br>
${horas}h ${minutos}m ${segundos}s`;
}

setInterval(atualizarTempo,1000);
atualizarTempo();

// ===== CORAÇÕES =====
function criarCoracoes(){
setInterval(()=>{
const heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
heart.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},400);
}

</script>

</body>
</html>
