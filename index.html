<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luan & Keysse ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-family:'Playfair Display', serif;
position:relative;
background:linear-gradient(135deg,#ff4e8a,#ff8fb1);
}

/* IMAGEM DE FUNDO AJUSTADA */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("fundo.png") center center no-repeat;
background-size:85%; 
opacity:0.22;
filter:blur(1.5px);
z-index:0;
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff4e8a,#ff8fb1);
z-index:20;
}

#login input{
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
}

#login button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
color:#ff4e8a;
font-weight:bold;
}

/* SITE */
#site{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
z-index:5;
position:relative;
}

h1{
font-family:'Great Vibes', cursive;
font-size:4rem;
margin-bottom:20px;
letter-spacing:2px;
text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.contador{
font-size:1.8rem;
background:rgba(255,255,255,0.25);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.tempo{
margin-top:15px;
font-size:2rem;
font-weight:bold;
}

/* FRASES */
.frase{
position:absolute;
top:15%;
font-family:'Great Vibes', cursive;
font-size:2rem;
opacity:0;
animation:fadeFrase 8s ease-in-out;
text-align:center;
max-width:80%;
text-shadow:0 3px 15px rgba(0,0,0,0.4);
}

@keyframes fadeFrase{
0%{opacity:0;}
20%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;}
}

/* CORAÇÕES */
.heart{
position:absolute;
bottom:-100px;
font-size:30px;
color:#ff0033;
animation:floatUp linear forwards;
opacity:0.8;
}

/* POLAROID */
.foto{
position:absolute;
bottom:-200px;
width:200px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
animation:floatUp linear forwards;
}

.foto img{
width:100%;
border-radius:8px;
}

/* BRILHO */
.sparkle{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}
</style>
</head>

<body>

<div id="login">
<h2>Digite nossa senha ❤️</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="verificarSenha()">Entrar</button>
<p id="erro"></p>
</div>

<div id="site">
<h1>Luan & Keysse ❤️</h1>
<div class="contador">
Estamos juntos há:
<div class="tempo" id="tempo"></div>
</div>
</div>

<audio id="musica" loop preload="auto">
<source src="imaturo.mp3" type="audio/mp3">
</audio>

<script>

/* LOGIN */
function verificarSenha(){
if(document.getElementById("senha").value==="18062018"){
document.getElementById("login").style.display="none";
document.getElementById("site").style.display="flex";
const musica=document.getElementById("musica");
musica.volume=0.35;
musica.play();
iniciarCoracoes();
iniciarFotos();
iniciarFrases();
iniciarBrilho();
}else{
document.getElementById("erro").innerText="Senha incorreta 😢";
}
}

/* CONTADOR */
const dataInicio=new Date("2018-06-18T00:00:00");
function atualizarTempo(){
const agora=new Date();
const diff=Math.floor((agora-dataInicio)/1000);
const anos=Math.floor(diff/(365.25*24*3600));
const meses=Math.floor((diff%(365.25*24*3600))/(30.44*24*3600));
const dias=Math.floor((diff%(30.44*24*3600))/(24*3600));
const horas=Math.floor((diff%(24*3600))/3600);
const minutos=Math.floor((diff%3600)/60);
const segundos=diff%60;
document.getElementById("tempo").innerHTML=
`${anos} anos, ${meses} meses, ${dias} dias<br>${horas}h ${minutos}m ${segundos}s`;
}
setInterval(atualizarTempo,1000);
atualizarTempo();

/* FRASES */
const frases=[
"Desde 18 de junho de 2018 minha vida tem mais cor.",
"Você é meu melhor capítulo.",
"Nosso amor é minha certeza.",
"A gente cresceu… mas o amor cresceu mais.",
"Se eu tivesse que escolher de novo, escolheria você."
];

function iniciarFrases(){
setInterval(()=>{
const frase=document.createElement("div");
frase.className="frase";
frase.innerText=frases[Math.floor(Math.random()*frases.length)];
document.body.appendChild(frase);
setTimeout(()=>frase.remove(),8000);
},10000);
}

/* CORAÇÕES */
function iniciarCoracoes(){
setInterval(()=>{
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),10000);
},800);
}

/* FOTOS */
const fotos=["foto1.png","foto2.png","foto3.png","foto4.png","foto5.png","foto6.png","foto7.png","foto8.png","foto9.png","foto10.png","foto11.png","foto12.png"];
function iniciarFotos(){
setInterval(()=>{
const div=document.createElement("div");
div.className="foto";
div.style.left=Math.random()*80+"vw";
div.style.animationDuration=(12+Math.random()*5)+"s";
div.innerHTML=`<img src="${fotos[Math.floor(Math.random()*fotos.length)]}">`;
document.body.appendChild(div);
setTimeout(()=>div.remove(),20000);
},3000);
}

/* BRILHO */
function iniciarBrilho(){
setInterval(()=>{
const s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
setTimeout(()=>s.remove(),4000);
},300);
}

</script>

</body>
</html>
