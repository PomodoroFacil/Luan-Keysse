<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luan & Keysse ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-family:'Playfair Display', serif;
position:relative;
background:linear-gradient(135deg,#ff4e8a,#ff8fb1);
}

/* FUNDO DESKTOP */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:url("fundo.png") center center no-repeat;
background-size:70%;
opacity:0.22;
filter:blur(1.5px);
z-index:0;
}

/* SITE */
#site{
display:none;
flex-direction:column;
align-items:center;
text-align:center;
z-index:5;
position:relative;
padding:20px;
}

h1{
font-family:'Great Vibes', cursive;
font-size:4rem;
margin-bottom:20px;
text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.contador{
font-size:1.8rem;
background:rgba(255,255,255,0.25);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.tempo{
margin-top:15px;
font-size:2rem;
font-weight:bold;
}

/* FRASES */
.frase{
position:absolute;
top:12%;
font-family:'Great Vibes', cursive;
font-size:2rem;
opacity:0;
animation:fadeFrase 8s ease-in-out;
text-align:center;
max-width:85%;
text-shadow:0 3px 15px rgba(0,0,0,0.4);
}

@keyframes fadeFrase{
0%{opacity:0;}
20%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;}
}

/* CORAÇÕES */
.heart{
position:absolute;
bottom:-100px;
font-size:30px;
color:#ff0033;
animation:floatUp linear forwards;
opacity:0.8;
}

/* POLAROID */
.foto{
position:absolute;
bottom:-200px;
width:200px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
animation:floatUp linear forwards;
}

.foto img{
width:100%;
border-radius:8px;
}

/* BRILHO */
.sparkle{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
opacity:0.8;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.2;}
50%{opacity:1;}
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* ===== MOBILE AJUSTES ===== */
@media (max-width: 768px){

body::before{
background-size:110%; /* mais zoom no mobile */
filter:blur(1px);
opacity:0.28;
}

h1{
font-size:2.8rem;
}

.contador{
padding:25px;
font-size:1.2rem;
}

.tempo{
font-size:1.5rem;
}

.frase{
font-size:1.6rem;
top:8%;
}

.foto{
width:140px;
}

.heart{
font-size:22px;
}

}
</style>
</head>

<body>

<div id="site">
<h1>Luan & Keysse ❤️</h1>
<div class="contador">
Estamos juntos há:
<div class="tempo" id="tempo"></div>
</div>
</div>

<audio id="musica" loop preload="auto">
<source src="imaturo.mp3" type="audio/mp3">
</audio>

<script>

document.getElementById("site").style.display="flex";
const musica=document.getElementById("musica");
musica.volume=0.35;
musica.play();

/* CONTADOR */
const dataInicio=new Date("2018-06-18T00:00:00");
function atualizarTempo(){
const agora=new Date();
const diff=Math.floor((agora-dataInicio)/1000);
const anos=Math.floor(diff/(365.25*24*3600));
const meses=Math.floor((diff%(365.25*24*3600))/(30.44*24*3600));
const dias=Math.floor((diff%(30.44*24*3600))/(24*3600));
const horas=Math.floor((diff%(24*3600))/3600);
const minutos=Math.floor((diff%3600)/60);
const segundos=diff%60;
document.getElementById("tempo").innerHTML=
`${anos} anos, ${meses} meses, ${dias} dias<br>${horas}h ${minutos}m ${segundos}s`;
}
setInterval(atualizarTempo,1000);
atualizarTempo();

/* FRASES */
const frases=[
"Desde 18 de junho de 2018 minha vida tem mais cor.",
"Você é meu melhor capítulo.",
"Nosso amor é minha certeza.",
"A gente cresceu… mas o amor cresceu mais.",
"Se eu tivesse que escolher de novo, escolheria você."
];

function iniciarFrases(){
setInterval(()=>{
const frase=document.createElement("div");
frase.className="frase";
frase.innerText=frases[Math.floor(Math.random()*frases.length)];
document.body.appendChild(frase);
setTimeout(()=>frase.remove(),8000);
},10000);
}
iniciarFrases();

</script>

</body>
</html>
