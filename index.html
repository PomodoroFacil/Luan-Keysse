<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luan & Keysse ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;

    /* FUNDO ROMÂNTICO */
    background-image: url('https://images.unsplash.com/photo-1516589091380-5d8e87df6999');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:0;
}

h1{
    font-size:3rem;
    margin-bottom:30px;
    z-index:1;
    letter-spacing:2px;
}

.contador{
    background:rgba(255,255,255,0.15);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    z-index:1;
    font-size:1.5rem;
}

.tempo{
    margin-top:15px;
    font-size:2rem;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="overlay"></div>

<h1>Luan & Keysse ❤️</h1>

<div class="contador">
Estamos juntos há:
<div class="tempo" id="tempo"></div>
</div>

<script>

const dataInicio = new Date("2018-06-18T00:00:00");

function atualizarTempo() {

    const agora = new Date();
    const diferenca = agora - dataInicio;

    const segundosTotais = Math.floor(diferenca / 1000);

    const anos = Math.floor(segundosTotais / (365.25 * 24 * 60 * 60));
    const meses = Math.floor((segundosTotais % (365.25 * 24 * 60 * 60)) / (30.44 * 24 * 60 * 60));
    const dias = Math.floor((segundosTotais % (30.44 * 24 * 60 * 60)) / (24 * 60 * 60));
    const horas = Math.floor((segundosTotais % (24 * 60 * 60)) / (60 * 60));
    const minutos = Math.floor((segundosTotais % (60 * 60)) / 60);
    const segundos = segundosTotais % 60;

    document.getElementById("tempo").innerHTML =
        `${anos} anos, ${meses} meses, ${dias} dias<br>
         ${horas}h ${minutos}m ${segundos}s`;
}

setInterval(atualizarTempo, 1000);
atualizarTempo();

</script>

</body>
</html>
